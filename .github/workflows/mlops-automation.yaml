name: MLOps Automation Pipeline

# TAHAP 1: Konfigurasi Pemicu (Trigger)
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.10'
  # Threshold performa model
  ACCURACY_THRESHOLD: '0.75'
  F1_THRESHOLD: '0.70'

jobs:
  # JOB 1: AUTOMATED TESTING
  automated-testing:
    name: "Stage 1 - Automated Testing"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run Pytest (Code Integrity Check)
        run: |
          echo "🧪 Running automated tests..."
          pytest tests/ -v --tb=short
          echo "✅ All tests passed!"

  # JOB 2: AUTOMATED TRAINING
  automated-training:
    name: "Stage 2 - Automated Training"
    runs-on: ubuntu-latest
    needs: automated-testing

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc mlflow xgboost

      - name: Setup DVC and Pull Data
        run: |
          echo "📦 Setting up DVC..."
          dvc --version
          if [ -d ".dvc" ]; then
            dvc pull || echo "⚠️ DVC pull skipped (no remote configured)"
          else
            echo "⚠️ DVC not initialized, using local data"
          fi

      - name: Run Training Script
        run: |
          echo "🚀 Starting automated training..."
          python src/modeling/train.py
          echo "✅ Training completed successfully!"

      - name: Upload Trained Model & Metrics
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            models/
            metrics.json
            mlruns/
          retention-days: 7

  # JOB 3: MODEL EVALUATION & VALIDATION
  model-evaluation:
    name: "Stage 3 - Model Evaluation & Validation"
    runs-on: ubuntu-latest
    needs: automated-training
    outputs:
      validation_passed: ${{ steps.evaluate.outputs.passed }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download Trained Model
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: ./

      - name: Evaluate Model Performance
        id: evaluate
        run: |
          echo "📊 Evaluating model against thresholds..."
          echo "Accuracy Threshold: ${{ env.ACCURACY_THRESHOLD }}"
          echo "F1 Threshold: ${{ env.F1_THRESHOLD }}"
          
          python scripts/evaluate_model.py \
            --metrics-file metrics.json \
            --accuracy-threshold ${{ env.ACCURACY_THRESHOLD }} \
            --f1-threshold ${{ env.F1_THRESHOLD }}
          
          if [ $? -eq 0 ]; then
            echo "passed=true" >> $GITHUB_OUTPUT
            echo "✅ Model PASSED validation!"
          else
            echo "passed=false" >> $GITHUB_OUTPUT
            echo "❌ Model FAILED validation!"
            exit 1
          fi
  # JOB 4: AUTO-REGISTRY UPDATE (MLflow Model Registry)
  model-registry-update:
    name: "Stage 4 - Auto-Registry Update"
    runs-on: ubuntu-latest
    needs: model-evaluation
    if: needs.model-evaluation.outputs.validation_passed == 'true'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mlflow

      - name: Download Trained Model
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: ./

      - name: Transition Model to Staging
        run: |
          echo "📝 Transitioning latest model to Staging stage..."
          python scripts/register_model.py \
            --model-name "ChurnModel-XGBoost" \
            --stage "Staging"
          echo "✅ Model successfully transitioned to: Staging"

      - name: Pipeline Summary
        run: |
          echo "============================================"
          echo "🎉 MLOps Pipeline Completed Successfully!"
          echo "============================================"
          echo "✅ Stage 1: Automated Testing"
          echo "✅ Stage 2: Automated Training"
          echo "✅ Stage 3: Model Evaluation & Validation"
          echo "✅ Stage 4: Auto-Registry Update (Staging)"
          echo "============================================"